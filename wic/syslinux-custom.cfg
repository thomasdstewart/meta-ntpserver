PROMPT 1
TIMEOUT 50

ALLOWOPTIONS 1
SERIAL 0 115200

DEFAULT slotA

LABEL slotA
  KERNEL /bzImage
  APPEND label=slotA root=PARTUUID=076c4a2a-02 rootwait rootfstype=ext4 vga=0 console=tty0 console=ttyS0,115200n8 ro

LABEL slotB
  KERNEL /bzImage
  APPEND label=slotB root=PARTUUID=076c4a2a-03 rootwait rootfstype=ext4 vga=0 console=tty0 console=ttyS0,115200n8 ro
